<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon - Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #333;
}

.container {
    text-align: center;
    background: rgba(255, 255, 255, 0.9);
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    max-width: 500px;
}

h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 48px;
    color: #d6336c;
    margin-bottom: 10px;
}

h2 {
    font-size: 22px;
    margin-bottom: 20px;
}

.names {
    font-size: 28px;
    font-weight: 500;
    color: #b03060;
    margin: 20px 0;
}

.families {
    font-size: 16px;
    margin-top: 10px;
}

.coming {
    margin-top: 25px;
    font-size: 18px;
    font-weight: bold;
    color: #555;
}

.heart {
    font-size: 24px;
    color: red;
    animation: beat 1s infinite;
}

@keyframes beat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
}
</style>
</head>

<body>

<div class="container">
    <h1>Coming Soon</h1>

    <div class="names">
        Sanket ❤️ Sanjana
    </div>

    <h2>Tying the Knot Soon</h2>

    <div class="families">
        Lahoti & Bharadiya Family welcomes you
    </div>

    <div class="coming">
        Wedding Invitation Website Launching Soon
    </div>

    <div class="heart">❤️</div>
</div>

</body>
</html>
