<style>

}

}

.intro {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #3b0a0a, #8b0000, #d4af37);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;

}

    font-family: 'Great Vibes', cursive;
    font-size: clamp(32px, 8vw, 60px);
    color: #ffd700;
}

.intro p {
    font-size: clamp(14px, 4vw, 18px);
    color: #fff3c4;
}

/* HERO */
.hero {
    text-align: center;
    padding: clamp(70px, 15vw, 110px) 20px;
    background: linear-gradient(rgba(60,20,20,0.75), rgba(60,20,20,0.85)),
    url('https://images.unsplash.com/photo-1520854221256-17451cc331bf') center/cover;
    color: white;
}

.hero h1 {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(40px, 10vw, 80px);
    color: #f5d08a;

}

.hero p {
    font-size: clamp(14px, 4.5vw, 18px);
}

    margin-top: 15px;
    font-size: clamp(16px, 5vw, 22px);
    color: #ffe9b5;
}

/* SECTIONS */
.section {
    max-width: 900px;
    margin: 25px auto;
    padding: 20px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

.section h2 {
    text-align: center;

    font-size: clamp(20px, 6vw, 28px);
}

.story {
    text-align: center;
    line-height: 1.8;
    font-size: clamp(14px, 4vw, 16px);
}

.event {
    margin: 12px 0;
    padding: 18px;

.tag {

/* PETALS (MOBILE OPTIMIZED) */
.petal {
    position: fixed;
    top: -10px;
    font-size: 14px;
    animation: fall linear infinite;
    opacity: 0.6;
    pointer-events: none;
}

}
